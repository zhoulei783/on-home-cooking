<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上门烹饪服务平台 - 前后端直连版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background: #f5f5f5; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        h3 { color: #409eff; margin: 15px 0; }
        .form-item { margin: 10px 0; display: flex; align-items: center; }
        label { width: 80px; font-size: 14px; color: #666; }
        input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 10px; background: #409eff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        button:hover { background: #66b1ff; }
        .result { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 14px; line-height: 1.5; }
        .success { background: #f0f9eb; color: #67c23a; }
        .error { background: #fef0f0; color: #f56c6c; }
        .log { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px; font-size: 12px; color: #666; white-space: pre-wrap; }
        .list-item { padding: 10px; border-bottom: 1px solid #eee; margin: 5px 0; }
        .list-item:last-child { border-bottom: none; }
        .chef-card { border: 1px solid #e4e7ed; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .chef-name { font-size: 16px; font-weight: bold; color: #303133; margin-bottom: 5px; }
        .chef-skill { font-size: 14px; color: #606266; margin-bottom: 8px; }
        .review-btn { background: #67c23a; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-bottom: 8px; margin-right: 8px; }
        .review-btn:hover { background: #85ce61; }
        .order-btn { background: #909399; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-bottom: 8px; }
        .order-btn:hover { background: #a6a9ad; }
        .chef-price { font-size: 18px; color: #e6a23c; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 20px; color: #999; }
        .review-item { padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .review-rating { color: #ff9800; margin-bottom: 5px; }
        .review-content { font-size: 14px; color: #666; }
        .review-time { font-size: 12px; color: #999; }
    </style>
</head>
<body>
<h2>上门烹饪服务平台</h2>

<!-- 登录模块 -->
<div class="card">
    <h3>用户登录</h3>
    <div class="form-item">
        <label>手机号：</label>
        <input type="text" id="phone" value="13800138000" placeholder="请输入测试手机号：13800138000">
    </div>
    <div class="form-item">
        <label>密码：</label>
        <input type="password" id="pwd" value="123456" placeholder="请输入测试密码：123456">
    </div>
    <button onclick="login()">立即登录</button>
    <div id="loginResult" class="result"></div>
    <div id="loginLog" class="log"></div>
</div>

<!-- 厨师列表模块 -->
    <div class="card">
        <h3>查询空闲厨师</h3>
        <button onclick="getChefs()">查询空闲厨师</button>
        <div id="chefList" class="list-item"></div>
        <div id="chefLog" class="log"></div>
    </div>

    <!-- 评价弹窗 -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeReviewModal()">&times;</span>
            <h3 id="modalTitle">厨师评价</h3>
            <div id="reviewContent"></div>
        </div>
    </div>

    <!-- 订单弹窗 -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeOrderModal()">&times;</span>
            <h3 id="orderModalTitle">厨师订单记录</h3>
            <div id="orderContent"></div>
        </div>
    </div>

<!-- 订单创建模块 -->
<div class="card">
    <h3>创建订单</h3>
    <div class="form-item">
        <label>用户ID：</label>
        <input type="text" id="userId" value="1" placeholder="登录成功后获取的用户ID">
    </div>
    <div class="form-item">
        <label>厨师ID：</label>
        <input type="text" id="chefId" value="1" placeholder="查询厨师后获取的厨师ID">
    </div>
    <div class="form-item">
        <label>烹饪时间：</label>
        <input type="datetime-local" id="cookTime" value="2026-03-15T18:00">
    </div>
    <button onclick="createOrder()">创建订单</button>
    <div id="orderResult" class="result"></div>
    <div id="orderLog" class="log"></div>
</div>

<!-- 内置 Axios 核心代码（避免CDN依赖） -->
<script>
    // ========== 内置 Axios 核心（简化版，仅保留GET/POST） ==========
    const axios = {
        get: function (url, options = {}) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                // 拼接GET参数
                let fullUrl = url;
                if (options.params) {
                    const params = new URLSearchParams(options.params);
                    fullUrl += '?' + params.toString();
                }
                xhr.open('GET', fullUrl, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve({ data: JSON.parse(xhr.responseText) });
                    } else {
                        reject(new Error(`请求失败：${xhr.status} ${xhr.statusText}`));
                    }
                };
                xhr.onerror = function () {
                    reject(new Error('网络错误：无法连接到服务器'));
                };
                xhr.send();
            });
        },
        post: function (url, data = {}) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve({ data: JSON.parse(xhr.responseText) });
                    } else {
                        reject(new Error(`请求失败：${xhr.status} ${xhr.statusText}`));
                    }
                };
                xhr.onerror = function () {
                    reject(new Error('网络错误：无法连接到服务器'));
                };
                xhr.send(JSON.stringify(data));
            });
        }
    };

    // ========== 前后端连接核心配置 ==========
    // 后端接口基础地址（必须和SpringBoot配置一致）
    const BASE_URL = '/cooking'; // 部署在static目录下，用相对路径，无跨域

    // ========== 业务逻辑 ==========
    // 1. 登录功能
    function login() {
        const phone = document.getElementById('phone').value;
        const pwd = document.getElementById('pwd').value;
        const resultDom = document.getElementById('loginResult');
        const logDom = document.getElementById('loginLog');

        // 清空结果和日志
        resultDom.className = 'result';
        resultDom.innerHTML = '';
        logDom.innerHTML = `请求地址：${BASE_URL}/user/login?phone=${phone}&password=${pwd}\n请求方式：GET`;

        // 调用后端登录接口
        axios.get(`${BASE_URL}/user/login`, {
            params: { phone: phone, password: pwd }
        }).then(res => {
            logDom.innerHTML += `\n响应数据：${JSON.stringify(res.data, null, 2)}`;
            if (res.data.code === 200) {
                resultDom.className = 'result success';
                resultDom.innerHTML = `✅ 登录成功！欢迎 ${res.data.data.username}（用户ID：${res.data.data.id}）`;
                // 自动填充用户ID到订单模块
                document.getElementById('userId').value = res.data.data.id;
            } else {
                resultDom.className = 'result error';
                resultDom.innerHTML = `❌ 登录失败：${res.data.msg}`;
            }
        }).catch(err => {
            logDom.innerHTML += `\n错误信息：${err.message}`;
            resultDom.className = 'result error';
            resultDom.innerHTML = `❌ 登录异常：${err.message}<br>请检查：1.后端是否启动 2.接口地址是否正确`;
        });
    }

    // 2. 查询空闲厨师
    function getChefs() {
        const listDom = document.getElementById('chefList');
        const logDom = document.getElementById('chefLog');

        listDom.innerHTML = '加载中...';
        logDom.innerHTML = `请求地址：${BASE_URL}/chef/idle-with-reviews\n请求方式：GET`;

        // 调用后端厨师接口（包含评价信息）
        axios.get(`${BASE_URL}/chef/idle-with-reviews`).then(res => {
            logDom.innerHTML += `\n响应数据：${JSON.stringify(res.data, null, 2)}`;
            if (res.data.code === 200) {
                if (res.data.data.length === 0) {
                    listDom.innerHTML = '暂无空闲厨师';
                } else {
                    let html = '';
                    res.data.data.forEach(chef => {
                        const avgRating = chef.averageRating || '暂无评分';
                        const reviewCount = chef.reviewCount || 0;
                        html += `
                                <div class="chef-card">
                                    <div class="chef-name">${chef.name}</div>
                                    <div class="chef-skill">${chef.level || ''}；擅长：${chef.skill}</div>
                                    <button class="order-btn" onclick="showOrders(${chef.id}, '${chef.name}')">查看订单</button>
                                    <div class="chef-price">¥${chef.price} /次</div>
                                    <button class="select-btn" onclick="selectChef(${chef.id}, '${chef.name}')">选择该厨师，去下单 →</button>
                                    <button class="review-btn" onclick="showReviews(${chef.id}, '${chef.name}')">查看该厨师评价（${reviewCount}条，平均分：${avgRating}）</button>
                                </div>
                            `;
                    });
                    listDom.innerHTML = html;
                    // 自动填充第一个厨师ID到订单模块
                    document.getElementById('chefId').value = res.data.data[0].id;
                }
            } else {
                listDom.innerHTML = `查询失败：${res.data.msg}`;
            }
        }).catch(err => {
            logDom.innerHTML += `\n错误信息：${err.message}`;
            listDom.innerHTML = `❌ 查询异常：${err.message}`;
        });
    }

    // 3. 查看厨师评价
    function showReviews(chefId, chefName) {
        const modal = document.getElementById('reviewModal');
        const modalTitle = document.getElementById('modalTitle');
        const reviewContent = document.getElementById('reviewContent');

        modalTitle.innerHTML = `${chefName} 的评价`;
        reviewContent.innerHTML = '加载中...';
        modal.style.display = 'block';

        axios.get(`${BASE_URL}/chef/${chefId}/reviews`).then(res => {
            if (res.data.code === 200) {
                if (res.data.data.length === 0) {
                    reviewContent.innerHTML = '<p style="text-align:center;color:#999;">暂无评价</p>';
                } else {
                    let html = '';
                    res.data.data.forEach(review => {
                        const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                        html += `
                                <div class="review-item">
                                    <div class="review-rating">${stars}</div>
                                    <div class="review-content">${review.content || '暂无评价内容'}</div>
                                    <div class="review-time">评价时间：${review.createTime || '-'}</div>
                                </div>
                            `;
                    });
                    reviewContent.innerHTML = html;
                }
            } else {
                reviewContent.innerHTML = `<p style="text-align:center;color:#f56c6c;">获取评价失败：${res.data.msg}</p>`;
            }
        }).catch(err => {
            reviewContent.innerHTML = `<p style="text-align:center;color:#f56c6c;">获取评价异常：${err.message}</p>`;
        });
    }

    // 4. 关闭评价弹窗
    function closeReviewModal() {
        document.getElementById('reviewModal').style.display = 'none';
    }

    // 5. 选择厨师并跳转到下单
    function selectChef(chefId, chefName) {
        document.getElementById('chefId').value = chefId;
        alert(`已选择厨师：${chefName}（ID：${chefId}），请填写订单信息后点击创建订单按钮`);
        // 滚动到订单模块
        document.getElementById('orderResult').scrollIntoView({ behavior: 'smooth' });
    }

    // 6. 查看厨师订单
    function showOrders(chefId, chefName) {
        const modal = document.getElementById('orderModal');
        const modalTitle = document.getElementById('orderModalTitle');
        const orderContent = document.getElementById('orderContent');

        modalTitle.innerHTML = `${chefName} 的订单记录`;
        orderContent.innerHTML = '加载中...';
        modal.style.display = 'block';

        axios.get(`${BASE_URL}/order/chef/${chefId}`).then(res => {
            if (res.data.code === 200) {
                if (res.data.data.length === 0) {
                    orderContent.innerHTML = '<p style="text-align:center;color:#999;">暂无订单记录</p>';
                } else {
                    let html = '';
                    res.data.data.forEach(order => {
                        const stars = order.rating ? '★'.repeat(order.rating) + '☆'.repeat(5 - order.rating) : '暂无评分';
                        html += `
                                <div style="border-bottom:1px solid #eee; padding:15px 0;">
                                    <div style="font-weight:bold;margin-bottom:8px;">订单号：${order.orderNo}</div>
                                    <div style="margin-bottom:8px;">客户：${order.username || '未知'} | ${order.userPhone || ''}</div>
                                    <div style="margin-bottom:8px;">时间：${order.cookingTime || '-'}</div>
                                    <div style="margin-bottom:8px;">金额：¥${order.price}</div>
                                    <div style="margin-bottom:10px;">
                                        <div style="font-weight:bold;margin-bottom:5px;">菜品列表：</div>
                                        <ul style="margin-left:20px;">`;
                        
                        if (order.dishes && order.dishes.length > 0) {
                            order.dishes.forEach(dish => {
                                html += `<li>${dish.dishName} x ${dish.quantity} - ¥${dish.subtotal}</li>`;
                            });
                        } else {
                            html += '<li>暂无菜品信息</li>';
                        }
                        
                        html += `</ul>
                                    </div>
                                    <div style="color:#ff9800;margin-bottom:5px;">${stars}</div>
                                    <div style="font-size:14px;color:#666;">评价：${order.comment || '暂无评价内容'}</div>
                                </div>`;
                    });
                    orderContent.innerHTML = html;
                }
            } else {
                orderContent.innerHTML = `<p style="text-align:center;color:#f56c6c;">获取订单失败：${res.data.msg}</p>`;
            }
        }).catch(err => {
            orderContent.innerHTML = `<p style="text-align:center;color:#f56c6c;">获取订单异常：${err.message}</p>`;
        });
    }

    // 7. 关闭订单弹窗
    function closeOrderModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    // 8. 创建订单
    function createOrder() {
        const userId = document.getElementById('userId').value;
        const chefId = document.getElementById('chefId').value;
        const cookTime = document.getElementById('cookTime').value;
        const resultDom = document.getElementById('orderResult');
        const logDom = document.getElementById('orderLog');

        resultDom.className = 'result';
        resultDom.innerHTML = '';
        const requestData = {
            userId: Number(userId),
            chefId: Number(chefId),
            cookingTime: cookTime.replace('T', ' ') + ':00',
            address: '测试地址（前后端直连版）',
            price: 200.00
        };
        logDom.innerHTML = `请求地址：${BASE_URL}/order/create\n请求方式：POST\n请求数据：${JSON.stringify(requestData, null, 2)}`;

        // 调用后端创建订单接口
        axios.post(`${BASE_URL}/order/create`, requestData).then(res => {
            logDom.innerHTML += `\n响应数据：${JSON.stringify(res.data, null, 2)}`;
            if (res.data.code === 200) {
                resultDom.className = 'result success';
                resultDom.innerHTML = '✅ 订单创建成功！';
            } else {
                resultDom.className = 'result error';
                resultDom.innerHTML = `❌ 订单创建失败：${res.data.msg}`;
            }
        }).catch(err => {
            logDom.innerHTML += `\n错误信息：${err.message}`;
            resultDom.className = 'result error';
            resultDom.innerHTML = `❌ 订单创建异常：${err.message}`;
        });
    }
</script>
</body>
</html>
